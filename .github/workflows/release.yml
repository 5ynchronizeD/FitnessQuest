name: Release

# Auto-release: varje push till main skapar en ny version + release.
# Fungerar även om du pushar en tagg vX.Y.Z manuellt.
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write   # behövs för att skapa taggar och GitHub Releases

# Serialisera körningar så snabba commits inte skapar krockande releaser.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: ver
        run: |
          MSG=$(git log -1 --pretty=%B || true)
          if echo "$MSG" | grep -qiE '\[skip release\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release ([skip release] in commit message)."
            exit 0
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Manuell tagg → använd den som version.
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            # Push till main → räkna ut nästa version (öka patch).
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="1.0.0"
            else
              V="${LATEST#v}"
              IFS='.' read -r MA MI PA <<< "$V"
              MA="${MA:-1}"; MI="${MI:-0}"; PA="${PA:-0}"
              PA=$((PA + 1))
              VERSION="${MA}.${MI}.${PA}"
            fi
            TAG="v${VERSION}"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG} (version ${VERSION}, build ${GITHUB_RUN_NUMBER})"

      - name: Setup JDK 17
        if: steps.ver.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET 10
        if: steps.ver.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        if: steps.ver.outputs.skip != 'true'
        run: dotnet workload install maui-android

      - name: Run unit tests
        if: steps.ver.outputs.skip != 'true'
        run: dotnet test tests/FitnessQuest.Tests/FitnessQuest.Tests.csproj -c Release

      - name: Decode signing keystore
        if: steps.ver.outputs.skip != 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/fitnessquest.keystore"

      - name: Publish Android APK (Release, signed)
        if: steps.ver.outputs.skip != 'true'
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          dotnet publish FitnessQuest.csproj -f net10.0-android -c Release \
            -p:AndroidPackageFormat=apk \
            -p:ApplicationDisplayVersion=${{ steps.ver.outputs.version }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$GITHUB_WORKSPACE/fitnessquest.keystore" \
            -p:AndroidSigningStorePass="$KS_PASS" \
            -p:AndroidSigningKeyAlias="$KEY_ALIAS" \
            -p:AndroidSigningKeyPass="$KEY_PASS"

      - name: Stage APK with version name
        if: steps.ver.outputs.skip != 'true'
        run: cp bin/Release/net10.0-android/publish/com.obos.fitnessquest-Signed.apk "FitnessQuest-${{ steps.ver.outputs.tag }}.apk"

      - name: Create tag + GitHub Release
        if: steps.ver.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "FitnessQuest ${{ steps.ver.outputs.tag }}"
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: "FitnessQuest-${{ steps.ver.outputs.tag }}.apk"
